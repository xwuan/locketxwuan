<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1"/>
<title>Locket Gold — Xwuan</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5f4ff;--card:#ffffff;--border:#e6e0ff;
  --p1:#7c3aed;--p2:#a855f7;--accent:#06b6d4;
  --text:#1e1b3a;--muted:#8878b0;--warning:#f59e0b;
  --radius:18px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{overscroll-behavior:none;
  background:var(--bg);color:var(--text);
  font-family:'Be Vietnam Pro',sans-serif;
  font-size:15px;line-height:1.7;font-weight:500;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;
}
/* BG LAYERS */
.bg-dots{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(168,85,247,.10) 1px,transparent 1px);
  background-size:26px 26px;
}
.bg-decos{position:fixed;inset:0;z-index:0;pointer-events:none;font-size:1.8rem;opacity:.06;}
.bg-decos span:nth-child(1){position:absolute;top:8%;left:5%;animation:floatDeco 7s ease-in-out infinite 0s;}
.bg-decos span:nth-child(2){position:absolute;top:12%;right:6%;animation:floatDeco 7s ease-in-out infinite 2s;}
.bg-decos span:nth-child(3){position:absolute;bottom:18%;left:8%;animation:floatDeco 7s ease-in-out infinite 4s;}
.bg-decos span:nth-child(4){position:absolute;bottom:22%;right:9%;animation:floatDeco 7s ease-in-out infinite 1s;}

@keyframes floatDeco{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes popIn{from{opacity:0;transform:scale(.88) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

.wrap{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:28px 16px 72px;}

/* HERO */
.hero{text-align:center;padding:24px 0 20px;animation:popIn .55s cubic-bezier(.34,1.56,.64,1) both;}
.hero-avatar{width:96px;height:96px;border-radius:50%;border:3px solid var(--p2);
  box-shadow:0 0 0 6px rgba(168,85,247,.12),0 8px 24px rgba(124,58,237,.18);
  object-fit:cover;display:block;margin:0 auto 12px;background:var(--border);}
.avatar-wrap{position:relative;display:inline-block;margin-bottom:12px;}
.avatar-wrap .badge{
  position:absolute;bottom:0;right:0;width:32px;height:32px;border-radius:50%;
  border:2.5px solid #fff;overflow:hidden;background:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.12);}
.avatar-wrap .badge img{width:100%;height:100%;object-fit:cover;}
.brand{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.9rem;
  background:linear-gradient(135deg,var(--p1),var(--p2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.15;margin-bottom:6px;}
.tagline{font-size:.8rem;color:var(--muted);font-weight:500;letter-spacing:.02em;}

/* QUICK ENTRY */
.quick-entry{
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;box-shadow:0 2px 16px rgba(124,58,237,.06);
  animation:slideUp .45s .08s ease both;margin-bottom:14px;
}
.entry-label{font-family:'Be Vietnam Pro',sans-serif;font-weight:700;font-size:.75rem;
  color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.entry-row{display:flex;gap:8px;}
.entry-input{
  flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;
  padding:12px 14px;color:var(--p1);font-family:'Be Vietnam Pro',sans-serif;
  font-size:.9rem;font-weight:600;outline:none;letter-spacing:.05em;
  text-transform:uppercase;transition:border-color .2s,box-shadow .2s;
}
.entry-input::placeholder{color:var(--muted);text-transform:none;font-size:.82rem;font-weight:500;}
.entry-input:focus{border-color:var(--p2);box-shadow:0 0 0 3px rgba(168,85,247,.1);}
.btn-entry{
  padding:12px 18px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;
  font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:900;
  letter-spacing:.04em;cursor:pointer;white-space:nowrap;
  box-shadow:0 5px 0 #5b20c0,0 2px 12px rgba(124,58,237,.3);
  transition:all .18s;
}
.btn-entry:hover{opacity:.92;}
.btn-entry:active{transform:translateY(4px);box-shadow:0 1px 0 #5b20c0;}

/* CARDS */
.card{
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;box-shadow:0 2px 16px rgba(124,58,237,.06);
  text-decoration:none;color:inherit;display:block;
  transition:transform .2s,box-shadow .2s,border-color .2s;
}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(124,58,237,.12);border-color:var(--p2);}
.card-row{display:flex;gap:9px;align-items:flex-start;margin-bottom:10px;}
.card-icon{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  background:linear-gradient(135deg,var(--p1),var(--p2));
}
.card-icon.mint{background:linear-gradient(135deg,var(--accent),#22d3ee);}
.card-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;color:var(--p1);margin-bottom:2px;}
.card-sub{font-size:.82rem;color:var(--muted);line-height:1.55;font-weight:500;}
.card-arrow{font-size:.78rem;color:var(--p2);font-weight:700;margin-top:6px;display:inline-block;}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.card-full{grid-column:1/-1;}
.card.anim1{animation:slideUp .5s .12s ease both;}
.card.anim2{animation:slideUp .5s .20s ease both;}
.card.anim3{animation:slideUp .5s .28s ease both;}
.card.anim4{animation:slideUp .5s .36s ease both;}

footer{text-align:center;font-size:.7rem;color:var(--muted);padding-top:8px;
  font-family:'Be Vietnam Pro',sans-serif;font-weight:500;}
.admin-link{
  position:fixed;bottom:16px;right:16px;z-index:10;
  font-size:.7rem;color:rgba(124,58,237,.25);text-decoration:none;
  font-family:'Be Vietnam Pro',sans-serif;font-weight:600;transition:color .2s;
}
.admin-link:hover{color:var(--p1);}

@media(max-width:480px){
  .wrap{padding:20px 14px 60px;}
  .hero{padding:16px 0 14px;}
  .avatar-wrap .hero-avatar{width:80px;height:80px;}
  .brand{font-size:1.55rem;}
  .quick-entry{padding:14px 16px;}
  .entry-row{flex-direction:column;gap:8px;}
  .btn-entry{width:100%;text-align:center;}
  .card-grid{grid-template-columns:1fr;}
  .card-full{grid-column:auto;}
  .card{padding:14px 16px;}
}
</style>
</head>
<body>
<div class="bg-dots"></div>
<div class="bg-decos"><span>✨</span><span>💫</span><span>⭐</span><span>🌟</span></div>

<div class="wrap">
  <div class="hero">
    <div class="avatar-wrap">
      <img class="hero-avatar" src="images/avatar.png" alt="Xwuan" onerror="this.style.background='linear-gradient(135deg,#7c3aed,#a855f7)'"/>
      <div class="badge"><img src="images/locket.png" alt="Locket" onerror="this.style.background='#f5f4ff'"/></div>
    </div>
    <div class="brand">Locket Gold ✦ Xwuan</div>
    <div class="tagline">✦ Dịch vụ Locket Gold · Uy tín · Bảo hành vĩnh viễn ✦</div>
  </div>

  <div class="quick-entry">
    <div class="entry-label">⚡ Nhập mã truy cập nhanh</div>
    <div class="entry-row">
      <input class="entry-input" id="codeInput" placeholder="VD: XW-A3K7P2" maxlength="20"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')goGuide()"/>
      <button class="btn-entry" onclick="goGuide()">→ Vào Guide</button>
    </div>
  </div>

  <div class="card-grid">
    <a class="card anim1" href="https://drive.google.com/drive/folders/18hHoMdFI_Dak6nLCD4vd-PGp1rhEQy4v" target="_blank">
      <div class="card-row">
        <div class="card-icon mint">💬</div>
        <div><div class="card-title">Feedback</div><div class="card-sub">Đánh giá từ khách</div></div>
      </div>
      <span class="card-arrow">→ Xem ngay</span>
    </a>
    <a class="card anim1" href="https://zalo.me/0822307662" target="_blank">
      <div class="card-row">
        <div class="card-icon">💛</div>
        <div><div class="card-title">Nhắn Xwuan</div><div class="card-sub">Zalo · Hỗ trợ nhanh</div></div>
      </div>
      <span class="card-arrow">→ Zalo</span>
    </a>
  </div>

  <footer style="margin-top:20px;">© 2025 Locket Gold Xwuan · Uy tín tạo niềm tin 💜</footer>
</div>

<a href="/admin" class="admin-link">⚙ admin</a>

<script>
function goGuide(){const v=document.getElementById('codeInput').value.trim();if(!v){document.getElementById('codeInput').focus();return;}window.location.href='/guide?code='+encodeURIComponent(v);}
</script>
</body>
</html>
